<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>📚 لیسه خصوصی اصیل شهر</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: white;

        img {
            max-width: 150px;
            margin-bottom: 20px;
        }

<body>

    <!-- کتابخانه QR Code JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        new QRCode(document.getElementById("qrcode"), {
